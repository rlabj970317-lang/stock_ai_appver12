<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 주식 인사이트 플래너 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .news-card { transition: all 0.2s ease-in-out; }
        .news-card:hover { transform: translateY(-2px); border-color: #bfdbfe; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-blue-200 selection:text-blue-900">

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <header class="text-center mb-8 fade-in">
            <div class="inline-flex items-center justify-center p-3 bg-blue-100 text-blue-600 rounded-full mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-gray-900 mb-2">AI 주식 인사이트 플래너</h1>
            <p class="text-gray-500 text-sm">실시간 검색 및 AI 분석을 통한 스마트한 투자 전략</p>
        </header>

        <div id="api-key-container" class="mb-8 glass-card rounded-2xl p-6 fade-in border-l-4 border-yellow-400">
            <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
                <span class="mr-2">🔑</span> API 키 설정 (최초 1회만 입력)
            </h2>
            <p class="text-sm text-gray-600 mb-4">깃허브 공개(Public) 상태를 유지하기 위해 키를 코드에 적지 않고 기기에 안전하게 저장합니다.</p>
            <div class="flex gap-2">
                <input type="password" id="api-key-input" placeholder="새로 발급받은 API 키를 여기에 붙여넣으세요" 
                    class="block w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-100 outline-none shadow-sm">
                <button type="button" onclick="saveApiKey()"
                    class="bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2 px-6 rounded-xl text-sm transition-colors whitespace-nowrap">
                    키 저장하기
                </button>
            </div>
            <p id="api-key-status" class="text-sm font-bold text-emerald-600 mt-3 hidden flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                사용자님의 기기(브라우저)에 키가 안전하게 저장되었습니다!
            </p>
        </div>

        <div class="relative z-10 mb-8 fade-in">
            <div class="relative flex items-center">
                <input type="text" id="ticker-input" placeholder="종목 코드 입력 (예: AAPL, 삼성전자)" 
                    onkeydown="if(event.key === 'Enter') startAnalysis()"
                    class="block w-full pl-6 pr-32 py-4 bg-white border border-gray-200 rounded-2xl text-lg focus:ring-4 focus:ring-blue-100 outline-none shadow-sm uppercase">
                <button type="button" id="submit-btn" onclick="startAnalysis()"
                    class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-xl flex items-center justify-center min-w-[100px] transition-colors">
                    <span id="btn-text">분석하기</span>
                    <div id="btn-spinner" class="spinner hidden border-white border-opacity-30 border-left-white"></div>
                </button>
            </div>
        </div>

        <div id="status-container" class="hidden mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center"></div>

        <div id="results-container" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card rounded-2xl p-6 fade-in flex flex-col h-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <div id="res-company-logo-container" class="flex items-center justify-center p-1 rounded-xl bg-white border border-gray-100 mr-3 w-12 h-12 overflow-hidden shadow-inner">
                            <img id="res-company-logo" src="" alt="Company Logo" class="hidden w-full h-full object-contain p-0.5">
                            <span id="res-logo-fallback" class="hidden text-3xl text-indigo-600">🏢</span>
                            <div id="res-logo-loading-spinner" class="spinner border-gray-200 border-left-blue-500 w-5 h-5"></div>
                        </div>
                        <span id="res-company-name-text">기업 개요</span>
                    </h2>
                    <p id="res-description" class="text-gray-600 leading-relaxed text-sm flex-grow"></p>
                </div>

                <div class="glass-card rounded-2xl p-6 fade-in flex flex-col h-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="p-2 bg-rose-100 text-rose-600 rounded-lg mr-3">💡</span> AI 투자 전략
                        </div>
                        <span id="res-action-badge" class="px-3 py-1 rounded-full text-sm font-bold bg-gray-100 text-gray-600">분석중</span>
                    </h2>
                    
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex-grow flex flex-col gap-3 justify-center">
                        <div>
                            <p class="text-sm font-semibold text-gray-700 mb-1">📊 1년(52주) 주가 변동 범위:</p>
                            <div class="flex justify-between items-center bg-white p-2.5 rounded-lg border border-gray-200 text-sm hover:shadow-sm transition-shadow">
                                <span class="text-blue-600 font-bold">최저: <span id="res-52w-low">-</span></span>
                                <span class="text-gray-400 font-medium">~</span>
                                <span class="text-red-600 font-bold">최고: <span id="res-52w-high">-</span></span>
                            </div>
                        </div>

                        <div>
                            <p class="text-sm font-semibold text-gray-700 mb-1">📍 현재 주가 위치 평가:</p>
                            <p id="res-price-level" class="text-gray-700 text-sm leading-relaxed bg-white p-2.5 rounded-lg border border-gray-200"></p>
                        </div>

                        <div class="pt-3 border-t border-gray-100 mt-1">
                            <p class="text-sm font-semibold text-gray-700 mb-1">💰 목표/권장 진입 가격:</p>
                            <p id="res-target-price" class="text-gray-800 text-sm leading-relaxed font-medium bg-white p-2.5 rounded-lg border border-gray-200"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="p-2 bg-emerald-100 text-emerald-600 rounded-lg mr-3">📈</span> 종합 주가 전망
                </h2>
                <p id="res-outlook" class="text-gray-700 leading-relaxed text-sm bg-emerald-50/50 p-5 rounded-xl border border-emerald-100"></p>
            </div>

            <div class="glass-card rounded-2xl p-6 fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="p-2 bg-blue-100 text-blue-600 rounded-lg mr-3">📰</span> 실시간 주요 뉴스
                </h2>
                <div id="res-news-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('GEMINI_API_KEY');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
                document.getElementById('api-key-status').classList.remove('hidden');
            }
        });

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) {
                alert("API 키를 입력해주세요!");
                return;
            }
            localStorage.setItem('GEMINI_API_KEY', key);
            document.getElementById('api-key-status').classList.remove('hidden');
            alert("완료! 이제 분석하기 버튼을 누르시면 됩니다.");
        }

        async function startAnalysis() {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            if (!apiKey) {
                alert("위쪽 노란색 박스에 구글 API 키를 먼저 입력하고 저장해주세요!");
                document.getElementById('api-key-input').focus();
                return;
            }

            const input = document.getElementById('ticker-input');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const resultsContainer = document.getElementById('results-container');
            const statusContainer = document.getElementById('status-container');

            const ticker = input.value.trim().toUpperCase();
            if (!ticker) {
                alert("분석할 주식의 티커나 이름을 입력해주세요.");
                return;
            }

            input.disabled = true;
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            
            document.getElementById('res-company-logo').classList.add('hidden');
            document.getElementById('res-company-logo').src = '';
            document.getElementById('res-logo-loading-spinner').classList.remove('hidden');
            document.getElementById('res-logo-fallback').classList.add('hidden');
            document.getElementById('res-company-name-text').textContent = '기업 개요';

            statusContainer.className = "mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center bg-blue-50 text-blue-600";
            statusContainer.textContent = `🚀 [${ticker}] 실시간 데이터를 바탕으로 AI가 심층 분석 중입니다... (최대 10초 소요)`;
            statusContainer.classList.remove('hidden');
            
            try {
                const data = await fetchWithRetry(ticker, apiKey, 3);
                renderResults(data);
                statusContainer.classList.add('hidden');
            } catch (error) {
                statusContainer.className = "mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center bg-red-50 text-red-600";
                statusContainer.textContent = "오류 발생: " + error.message;
            } finally {
                input.disabled = false;
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        }

        async function fetchWithRetry(ticker, apiKey, maxRetries) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            // 🚀 프롬프트 변경: 이미지 주소 대신 '웹사이트 도메인'을 찾도록 지시
            const prompt = `당신은 탁월한 금융 애널리스트입니다. 종목 '${ticker}'에 대해 구글 검색을 활용해 최신 실시간 데이터를 바탕으로 아래 내용을 분석해주세요.

            반드시 아래의 '순수 JSON' 형식으로만 반환하고 다른 텍스트나 마크다운 기호(\`\`\`)는 절대 넣지 마세요.

            {
                "companyName": "공식 회사명",
                "domain": "회사의 공식 웹사이트 도메인 (예: apple.com, tesla.com, samsung.com - 반드시 http:// 나 www. 를 제외하고 순수 영문 도메인만 작성할 것)",
                "description": "회사의 주요 사업과 시장 내 위치 설명",
                "outlook": "최근 실적 및 거시경제 상황을 종합한 향후 주가 전망",
                "fiftyTwoWeekHigh": "1년(
