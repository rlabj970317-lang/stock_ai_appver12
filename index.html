<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 주식 인사이트 플래너 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .news-card { transition: all 0.2s ease-in-out; }
        .news-card:hover { transform: translateY(-2px); border-color: #bfdbfe; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-blue-200 selection:text-blue-900">

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <header class="text-center mb-8 fade-in">
            <div class="inline-flex items-center justify-center p-3 bg-blue-100 text-blue-600 rounded-full mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-gray-900 mb-2">AI 주식 인사이트 플래너</h1>
            <p class="text-gray-500 text-sm">실시간 검색 및 AI 분석을 통한 스마트한 투자 전략</p>
        </header>

        <div id="api-key-container" class="mb-8 glass-card rounded-2xl p-6 fade-in border-l-4 border-yellow-400">
            <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
                <span class="mr-2">🔑</span> API 키 설정 (최초 1회만 입력)
            </h2>
            <p class="text-sm text-gray-600 mb-4">깃허브 공개(Public) 상태를 유지하기 위해 키를 코드에 적지 않고 기기에 안전하게 저장합니다.</p>
            <div class="flex gap-2">
                <input type="password" id="api-key-input" placeholder="새로 발급받은 API 키를 여기에 붙여넣으세요" 
                    class="block w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-100 outline-none shadow-sm">
                <button type="button" onclick="saveApiKey()"
                    class="bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2 px-6 rounded-xl text-sm transition-colors whitespace-nowrap">
                    키 저장하기
                </button>
            </div>
            <p id="api-key-status" class="text-sm font-bold text-emerald-600 mt-3 hidden flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                사용자님의 기기(브라우저)에 키가 안전하게 저장되었습니다!
            </p>
        </div>

        <div class="relative z-10 mb-8 fade-in">
            <div class="relative flex items-center">
                <input type="text" id="ticker-input" placeholder="종목 코드 입력 (예: AAPL, 삼성전자)" 
                    onkeydown="if(event.key === 'Enter') startAnalysis()"
                    class="block w-full pl-6 pr-32 py-4 bg-white border border-gray-200 rounded-2xl text-lg focus:ring-4 focus:ring-blue-100 outline-none shadow-sm uppercase">
                <button type="button" id="submit-btn" onclick="startAnalysis()"
                    class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-xl flex items-center justify-center min-w-[100px] transition-colors">
                    <span id="btn-text">분석하기</span>
                    <div id="btn-spinner" class="spinner hidden border-white border-opacity-30 border-left-white"></div>
                </button>
            </div>
        </div>

        <div id="status-container" class="hidden mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center"></div>

        <div id="results-container" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card rounded-2xl p-6 fade-in flex flex-col h-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <div id="res-company-logo-container" class="flex items-center justify-center p-1 rounded-xl bg-white border border-gray-100 mr-3 w-12 h-12 overflow-hidden shadow-inner">
                            <img id="res-company-logo" src="" alt="Company Logo" class="hidden w-full h-full object-contain p-0.5">
                            <span id="res-logo-fallback" class="hidden text-3xl text-indigo-600">🏢</span>
                            <div id="res-logo-loading-spinner" class="spinner border-gray-200 border-left-blue-500 w-5 h-5"></div>
                        </div>
                        <span id="res-company-name-text">기업 개요</span>
                    </h2>
                    <p id="res-description" class="text-gray-600 leading-relaxed text-sm flex-grow"></p>
                </div>

                <div class="glass-card rounded-2xl p-6 fade-in flex flex-col h-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="p-2 bg-rose-100 text-rose-600 rounded-lg mr-3">💡</span> AI 투자 전략
                        </div>
                        <span id="res-action-badge" class="px-3 py-1 rounded-full text-sm font-bold bg-gray-100 text-gray-600">분석중</span>
                    </h2>
                    
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex-grow flex flex-col gap-3 justify-center">
                        <div>
                            <p class="text-sm font-semibold text-gray-700 mb-1">📊 1년(52주) 주가 변동 범위:</p>
                            <div class="flex justify-between items-center bg-white p-2.5 rounded-lg border border-gray-200 text-sm hover:shadow-sm transition-shadow">
                                <span class="text-blue-600 font-bold">최저: <span id="res-52w-low">-</span></span>
                                <span class="text-gray-400 font-medium">~</span>
                                <span class="text-red-600 font-bold">최고: <span id="res-52w-high">-</span></span>
                            </div>
                        </div>

                        <div>
                            <p class="text-sm font-semibold text-gray-700 mb-1">📍 현재 주가 위치 평가:</p>
                            <p id="res-price-level" class="text-gray-700 text-sm leading-relaxed bg-white p-2.5 rounded-lg border border-gray-200"></p>
                        </div>

                        <div class="pt-3 border-t border-gray-100 mt-1">
                            <p class="text-sm font-semibold text-gray-700 mb-1">💰 목표/권장 진입 가격:</p>
                            <p id="res-target-price" class="text-gray-800 text-sm leading-relaxed font-medium bg-white p-2.5 rounded-lg border border-gray-200"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="p-2 bg-emerald-100 text-emerald-600 rounded-lg mr-3">📈</span> 종합 주가 전망
                </h2>
                <p id="res-outlook" class="text-gray-700 leading-relaxed text-sm bg-emerald-50/50 p-5 rounded-xl border border-emerald-100"></p>
            </div>

            <div class="glass-card rounded-2xl p-6 fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="p-2 bg-blue-100 text-blue-600 rounded-lg mr-3">📰</span> 실시간 주요 뉴스
                </h2>
                <div id="res-news-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        // API 키 불러오기 로직
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('GEMINI_API_KEY');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
                document.getElementById('api-key-status').classList.remove('hidden');
            }
        });

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) {
                alert("API 키를 입력해주세요!");
                return;
            }
            localStorage.setItem('GEMINI_API_KEY', key);
            document.getElementById('api-key-status').classList.remove('hidden');
            alert("완료! 이제 분석하기 버튼을 누르시면 됩니다.");
        }

        async function startAnalysis() {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            if (!apiKey) {
                alert("위쪽 노란색 박스에 구글 API 키를 먼저 입력하고 저장해주세요!");
                document.getElementById('api-key-input').focus();
                return;
            }

            const input = document.getElementById('ticker-input');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const resultsContainer = document.getElementById('results-container');
            const statusContainer = document.getElementById('status-container');

            const ticker = input.value.trim().toUpperCase();
            if (!ticker) {
                alert("분석할 주식의 티커나 이름을 입력해주세요.");
                return;
            }

            // 분석 진행 상태 UI
            input.disabled = true;
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            
            // 🚀 Reset logo/name for new search
            document.getElementById('res-company-logo').classList.add('hidden');
            document.getElementById('res-company-logo').src = '';
            document.getElementById('res-logo-loading-spinner').classList.remove('hidden');
            document.getElementById('res-logo-fallback').classList.add('hidden');
            document.getElementById('res-company-name-text').textContent = '기업 개요';

            statusContainer.className = "mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center bg-blue-50 text-blue-600";
            statusContainer.textContent = `🚀 [${ticker}] 최신 데이터를 수집하고 AI 분석 중입니다... (최대 10초 소요)`;
            statusContainer.classList.remove('hidden');
            
            try {
                const data = await fetchWithRetry(ticker, apiKey, 3);
                renderResults(data);
                statusContainer.classList.add('hidden');
            } catch (error) {
                statusContainer.className = "mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center bg-red-50 text-red-600";
                statusContainer.textContent = "오류 발생: " + error.message;
            } finally {
                input.disabled = false;
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        }

        async function fetchWithRetry(ticker, apiKey, maxRetries) {
            // 사용자 계정에 맞는 gemini-2.5-flash 모델 적용
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            // 🚀 AI 프롬프트 업데이트 (회사 로고 URL 및 정식 회사명 추가 요청)
            const prompt = `세계적인 금융 애널리스트로서 주식 '${ticker}'에 대한 최신 데이터를 수집하고 분석해주세요. 
            
            검색 결과를 바탕으로 다음 정보를 포함하는 '순수한 JSON 객체' 형식으로만 대답하세요. 마크다운 기호나 부연 설명을 넣으면 시스템이 고장납니다. 뉴스 목록은 4~5개 정도 찾아주세요.

            {
                "companyName": "공식 회사명", // 🚀 Add companyName for better title
                "logoUrl": "회사의 공식 로고 URL (http로 시작, 가능하면 SVG 또는 투명 PNG)", // 🚀 Add logoUrl
                "description": "회사의 주요 사업과 시장 내 위치 설명",
                "outlook": "최근 실적 및 거시경제 상황을 종합한 향후 주가 전망",
                "fiftyTwoWeekHigh": "1년(52주) 최고가 (검색하여 정확한 가격 명시, 예: $150.00 또는 150,000원)",
                "fiftyTwoWeekLow": "1년(52주) 최저가 (검색하여 정확한 가격 명시, 예: $90.00 또는 90,000원)",
                "priceLevelAssessment": "현재 주가가 1년 변동폭과 비교할 때 '고점', '저점', '적정 수준' 중 어디에 해당하는지 명확히 밝히고 그 이유를 짧게 설명",
                "action": "매수, 매도, 관망 중 하나를 선택",
                "targetPrice": "매수 시 권장 진입가, 매도 시 목표가 등 구체적인 가격대와 그 이유 (숫자 포함하여 상세히)",
                "news": [
                    {
                        "title": "실제 검색된 최신 뉴스 제목",
                        "summary": "뉴스 핵심 내용 요약",
                        "url": "해당 뉴스의 실제 웹페이지 링크 주소(http로 시작)",
                        "publishedAt": "뉴스가 보도된 날짜 또는 시간 (예: 2026.05.23 또는 3시간 전)"
                    }
                ]
            }`;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    if (attempt > 1) {
                        document.getElementById('status-container').textContent = `⏳ 서버 지연으로 다시 연결 중입니다... (${attempt}/${maxRetries})`;
                    }

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "googleSearch": {} }] 
                        })
                    });

                    if (response.status === 403) {
                        throw new Error("API 키가 유효하지 않거나 구글에 의해 정지되었습니다. Google AI Studio에서 새 키를 발급받아 주세요.");
                    }
                    if (response.status === 429) {
                        if (attempt === maxRetries) throw new Error("사용량이 너무 많습니다. 1분 후 다시 시도해주세요.");
                        await new Promise(r => setTimeout(r, 5000));
                        continue;
                    }
                    if (response.status === 503) {
                        if (attempt === maxRetries) throw new Error("구글 AI 서버가 바쁩니다. 잠시 후 다시 시도해주세요.");
                        await new Promise(r => setTimeout(r, 3000)); 
                        continue;
                    }

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(`통신 실패 (코드 ${response.status}): ${errData.error?.message || '알 수 없는 오류'}`);
                    }

                    const json = await response.json();
                    
                    if (!json.candidates || json.candidates.length === 0) {
                        throw new Error("AI가 데이터 수집을 완료하지 못했습니다.");
                    }

                    let aiText = json.candidates[0].content.parts[0].text;
                    aiText = aiText.replace(/```json/gi, '').replace(/```/g, '').trim();

                    return JSON.parse(aiText);

                } catch (error) {
                    if (attempt === maxRetries || error.message.includes("유효하지 않거나")) throw error;
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }

        function renderResults(data) {
            // 🚀 New: Handle dynamic company name and logo with fallback
            const companyNameText = document.getElementById('res-company-name-text');
            const logoImg = document.getElementById('res-company-logo');
            const logoFallback = document.getElementById('res-logo-fallback');
            const logoSpinner = document.getElementById('res-logo-loading-spinner');

            // Update dynamic company name, fallback to "기업 개요"
            companyNameText.textContent = data.companyName || '기업 개요';

            // Try to load the dynamic logo with fallback handling
            if (data.logoUrl && (data.logoUrl.startsWith('http') || data.logoUrl.startsWith('data:image'))) {
                // Set logoImg onload/onerror handlers before setting src to avoid race conditions
                logoImg.onload = () => {
                    // Image successfully loaded
                    logoSpinner.classList.add('hidden');
                    logoFallback.classList.add('hidden');
                    logoImg.classList.remove('hidden');
                };
                logoImg.onerror = () => {
                    // Image loading failed, show fallback circle
                    logoSpinner.classList.add('hidden');
                    logoImg.classList.add('hidden');
                    logoFallback.classList.remove('hidden');
                };
                logoImg.src = data.logoUrl;
            } else {
                // No logo URL provided or invalid, show fallback emoji directly
                logoSpinner.classList.add('hidden');
                logoImg.classList.add('hidden');
                logoFallback.classList.remove('hidden');
            }

            document.getElementById('res-description').textContent = data.description || "정보가 부족합니다.";
            document.getElementById('res-outlook').innerHTML = (data.outlook || "").replace(/\n/g, '<br>');

            // 1년 고점/저점 및 위치 평가 렌더링
            document.getElementById('res-52w-high').textContent = data.fiftyTwoWeekHigh || "정보 없음";
            document.getElementById('res-52w-low').textContent = data.fiftyTwoWeekLow || "정보 없음";
            
            // 고점/저점 키워드에 따라 색상 하이라이트 추가
            let assessmentText = data.priceLevelAssessment || "분석 정보를 가져올 수 없습니다.";
            assessmentText = assessmentText.replace(/(고점)/g, '<strong class="text-red-500 font-bold">$1</strong>');
            assessmentText = assessmentText.replace(/(저점)/g, '<strong class="text-blue-500 font-bold">$1</strong>');
            document.getElementById('res-price-level').innerHTML = assessmentText;

            // 투자 전략 (매수/매도/관망) 배지
            const actionBadge = document.getElementById('res-action-badge');
            const actionText = data.action || "분석 불가";
            actionBadge.textContent = actionText;
            
            if (actionText.includes("매수")) {
                actionBadge.className = "px-3 py-1 rounded-full text-sm font-bold bg-red-100 text-red-600 shadow-sm";
            } else if (actionText.includes("매도")) {
                actionBadge.className = "px-3 py-1 rounded-full text-sm font-bold bg-blue-100 text-blue-600 shadow-sm";
            } else {
                actionBadge.className = "px-3 py-1 rounded-full text-sm font-bold bg-gray-200 text-gray-700 shadow-sm";
            }

            document.getElementById('res-target-price').textContent = data.targetPrice || "적정 가격 정보를 산출할 수 없습니다.";

            // 뉴스 리스트 렌더링 (클릭 링크 + 날짜 유지)
            const newsList = document.getElementById('res-news-list');
            newsList.innerHTML = '';

            if (data.news && data.news.length > 0) {
                data.news.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.url && item.url.startsWith('http') ? item.url : '#';
                    if (a.href !== '#') {
                        a.target = "_blank"; 
                        a.rel = "noopener noreferrer";
                    }
                    
                    a.className = "flex flex-col h-full bg-white border border-gray-100 rounded-xl p-4 news-card group cursor-pointer hover:border-blue-100";
                    a.innerHTML = `
                        <h3 class="text-base font-bold text-gray-800 mb-2 group-hover:text-blue-600 transition-colors line-clamp-2">${item.title}</h3>
                        <p class="text-sm text-gray-600 mb-3 line-clamp-3 flex-grow">${item.summary}</p>
                        <div class="flex items-center text-xs text-gray-400 font-medium mt-auto pt-2 border-t border-gray-100">
                            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            ${item.publishedAt || "날짜 미상"}
                        </div>
                    `;
                    newsList.appendChild(a);
                });
            } else {
                newsList.innerHTML = `<p class="text-gray-500 text-center py-4 col-span-2">최신 뉴스가 없습니다.</p>`;
            }

            document.getElementById('results-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
