<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 주식 분석 with 준이준이준준이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .news-card { transition: all 0.2s ease-in-out; }
        .news-card:hover { transform: translateY(-2px); border-color: #bfdbfe; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-blue-200 selection:text-blue-900">

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <header class="text-center mb-8 fade-in">
            <div class="inline-flex items-center justify-center p-3 bg-blue-100 text-blue-600 rounded-full mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-gray-900 mb-2">AI 주식 분석 with 준이준이준준이</h1>
            <p class="text-gray-500 text-sm">실시간 검색 및 AI 분석을 통한 스마트한 투자 전략</p>
        </header>

        <div id="api-key-container" class="mb-8 glass-card rounded-2xl p-6 fade-in border-l-4 border-yellow-400">
            <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
                <span class="mr-2">🔑</span> API 키 설정 (최초 1회만 입력)
            </h2>
            <p class="text-sm text-gray-600 mb-4">깃허브 공개 상태 유지를 위해 키를 코드에 적지 않고 내 기기에만 안전하게 저장합니다.</p>
            <div class="flex gap-2">
                <input type="password" id="api-key-input" placeholder="새로 발급받은 API 키를 여기에 입력하세요" 
                    class="block w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-100 outline-none shadow-sm">
                <button type="button" onclick="saveApiKey()"
                    class="bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2 px-6 rounded-xl text-sm transition-colors whitespace-nowrap">
                    키 저장하기
                </button>
            </div>
            <p id="api-key-status" class="text-sm font-bold text-emerald-600 mt-3 hidden flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                기기에 키가 저장되었습니다!
            </p>
        </div>

        <div class="relative z-10 mb-8 fade-in">
            <div class="relative flex items-center">
                <input type="text" id="ticker-input" placeholder="종목 코드 입력 (예: AAPL, 삼성전자)" 
                    onkeydown="if(event.key === 'Enter') startAnalysis()"
                    class="block w-full pl-6 pr-32 py-4 bg-white border border-gray-200 rounded-2xl text-lg focus:ring-4 focus:ring-blue-100 outline-none shadow-sm uppercase">
                <button type="button" id="submit-btn" onclick="startAnalysis()"
                    class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-xl flex items-center justify-center min-w-[100px] transition-colors">
                    <span id="btn-text">분석하기</span>
                    <div id="btn-spinner" class="spinner hidden border-white border-opacity-30 border-left-white"></div>
                </button>
            </div>
        </div>

        <div id="status-container" class="hidden mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center"></div>

        <div id="results-container" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card rounded-2xl p-6 fade-in flex flex-col h-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="p-2 bg-indigo-100 text-indigo-600 rounded-lg mr-3">🏢</span>
                        <span id="res-company-name-text">기업 개요</span>
                    </h2>
                    <p id="res-description" class="text-gray-600 leading-relaxed text-sm flex-grow"></p>
                </div>

                <div class="glass-card rounded-2xl p-6 fade-in flex flex-col h-full">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="p-2 bg-rose-100 text-rose-600 rounded-lg mr-3">💡</span> AI 투자 전략
                        </div>
                        <span id="res-action-badge" class="px-3 py-1 rounded-full text-sm font-bold bg-gray-100 text-gray-600">분석중</span>
                    </h2>
                    
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex-grow flex flex-col gap-3 justify-center">
                        <div>
                            <p class="text-sm font-semibold text-gray-700 mb-1">📊 1년(52주) 주가 변동 범위:</p>
                            <div class="flex justify-between items-center bg-white p-2.5 rounded-lg border border-gray-200 text-sm">
                                <span class="text-blue-600 font-bold">최저: <span id="res-52w-low">-</span></span>
                                <span class="text-gray-400 font-medium">~</span>
                                <span class="text-red-600 font-bold">최고: <span id="res-52w-high">-</span></span>
                            </div>
                        </div>

                        <div>
                            <p class="text-sm font-semibold text-gray-700 mb-1">📍 현재 주가 위치 평가:</p>
                            <p id="res-price-level" class="text-gray-700 text-sm leading-relaxed bg-white p-2.5 rounded-lg border border-gray-200"></p>
                        </div>

                        <div class="pt-3 border-t border-gray-100 mt-1">
                            <p class="text-sm font-semibold text-gray-700 mb-1">💰 목표/권장 진입 가격:</p>
                            <p id="res-target-price" class="text-gray-800 text-sm leading-relaxed font-medium bg-white p-2.5 rounded-lg border border-gray-200"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="p-2 bg-emerald-100 text-emerald-600 rounded-lg mr-3">📈</span> 종합 주가 전망
                </h2>
                <p id="res-outlook" class="text-gray-700 leading-relaxed text-sm bg-emerald-50/50 p-5 rounded-xl border border-emerald-100"></p>
            </div>

            <div class="glass-card rounded-2xl p-6 fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="p-2 bg-blue-100 text-blue-600 rounded-lg mr-3">📰</span> 실시간 주요 뉴스
                </h2>
                <div id="res-news-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        // API 키 불러오기 로직
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('GEMINI_API_KEY');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
                document.getElementById('api-key-status').classList.remove('hidden');
            }
        });

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) {
                alert("API 키를 입력해주세요!");
                return;
            }
            localStorage.setItem('GEMINI_API_KEY', key);
            document.getElementById('api-key-status').classList.remove('hidden');
            alert("API 키가 저장되었습니다.");
        }

        async function startAnalysis() {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            if (!apiKey) {
                alert("위쪽 노란색 박스에 API 키를 입력하고 저장해주세요!");
                return;
            }

            const input = document.getElementById('ticker-input');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const resultsContainer = document.getElementById('results-container');
            const statusContainer = document.getElementById('status-container');

            const ticker = input.value.trim().toUpperCase();
            if (!ticker) {
                alert("티커를 입력해주세요.");
                return;
            }

            input.disabled = true;
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            
            statusContainer.className = "mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center bg-blue-50 text-blue-600";
            statusContainer.textContent = `🚀 [${ticker}] 분석을 시작합니다... (최대 10초 소요)`;
            statusContainer.classList.remove('hidden');
            
            try {
                const data = await fetchWithRetry(ticker, apiKey, 3);
                renderResults(data);
                statusContainer.classList.add('hidden');
            } catch (error) {
                statusContainer.className = "mb-6 p-4 rounded-xl fade-in text-sm font-medium text-center bg-red-50 text-red-600";
                statusContainer.textContent = "오류: " + error.message;
            } finally {
                input.disabled = false;
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
            }
        }

        async function fetchWithRetry(ticker, apiKey, maxRetries) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const prompt = `당신은 금융 애널리스트입니다. 종목 '${ticker}'에 대해 구글 검색 기반 실시간 데이터로 아래 내용을 분석하세요.
            반드시 아래의 '순수 JSON' 형식으로만 반환하고 다른 텍스트는 넣지 마세요.

            {
                "companyName": "공식 회사명",
                "description": "사업 개요 및 시장 위치 (3줄)",
                "outlook": "실적 및 경제 상황 기반 주가 전망",
                "fiftyTwoWeekHigh": "1년 최고가",
                "fiftyTwoWeekLow": "1년 최저가",
                "priceLevelAssessment": "현재가 고점/저점 여부와 이유",
                "action": "매수, 매도, 관망 중 택1",
                "targetPrice": "목표가/진입가와 근거",
                "news": [
                    {
                        "title": "뉴스 제목",
                        "summary": "뉴스 요약",
                        "url": "http로 시작하는 실제 뉴스 주소",
                        "publishedAt": "날짜/시간"
                    }
                ]
            }`;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "googleSearch": {} }] 
                        })
                    });

                    if (response.status === 403) throw new Error("API 키 오류");
                    if (!response.ok) throw new Error("서버 오류");

                    const json = await response.json();
                    let aiText = json.candidates[0].content.parts[0].text;
                    aiText = aiText.replace(/```json/gi, '').replace(/```/g, '').trim();

                    return JSON.parse(aiText);
                } catch (error) {
                    if (attempt === maxRetries) throw error;
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }

        function renderResults(data) {
            document.getElementById('res-company-name-text').textContent = data.companyName || '기업 개요';
            document.getElementById('res-description').textContent = data.description || "정보 부족";
            document.getElementById('res-outlook').innerHTML = (data.outlook || "").replace(/\n/g, '<br>');
            document.getElementById('res-52w-high').textContent = data.fiftyTwoWeekHigh || "-";
            document.getElementById('res-52w-low').textContent = data.fiftyTwoWeekLow || "-";
            
            let assessmentText = data.priceLevelAssessment || "정보 없음";
            assessmentText = assessmentText.replace(/(고점)/g, '<strong class="text-red-500">$1</strong>');
            assessmentText = assessmentText.replace(/(저점)/g, '<strong class="text-blue-500">$1</strong>');
            document.getElementById('res-price-level').innerHTML = assessmentText;

            const badge = document.getElementById('res-action-badge');
            const action = data.action || "관망";
            badge.textContent = action;
            if (action.includes("매수")) badge.className = "px-3 py-1 rounded-full text-sm font-bold bg-red-100 text-red-600";
            else if (action.includes("매도")) badge.className = "px-3 py-1 rounded-full text-sm font-bold bg-blue-100 text-blue-600";
            else badge.className = "px-3 py-1 rounded-full text-sm font-bold bg-gray-200 text-gray-700";

            document.getElementById('res-target-price').textContent = data.targetPrice || "-";

            const newsList = document.getElementById('res-news-list');
            newsList.innerHTML = '';

            if (data.news && data.news.length > 0) {
                data.news.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.url && item.url.startsWith('http') ? item.url : '#';
                    if (a.href !== '#') a.target = "_blank";
                    
                    a.className = "flex flex-col h-full bg-white border border-gray-100 rounded-xl p-4 news-card cursor-pointer";
                    a.innerHTML = `
                        <h3 class="text-base font-bold text-gray-800 mb-2 line-clamp-2">${item.title}</h3>
                        <p class="text-sm text-gray-600 mb-3 line-clamp-2 flex-grow">${item.summary}</p>
                        <div class="text-xs text-gray-400 font-medium border-t border-gray-50 pt-2">
                            📅 ${item.publishedAt || "날짜 미상"}
                        </div>
                    `;
                    newsList.appendChild(a);
                });
            } else {
                newsList.innerHTML = `<p class="text-gray-500 text-center py-4 col-span-2">뉴스가 없습니다.</p>`;
            }

            document.getElementById('results-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
